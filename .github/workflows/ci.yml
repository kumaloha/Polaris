name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp:
    name: C++ 引擎/求解器/生成器单测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run_tests.sh
        run: bash engine/run_tests.sh

  godot:
    name: GDScript 玩法端单测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot headless
        # 版本需与本地一致（项目用 4.6.2-stable）；若该 release 不存在请改成可用版本。
        run: |
          set -e
          VER=4.6.2-stable
          URL="https://github.com/godotengine/godot/releases/download/${VER}/Godot_v${VER}_linux.x86_64.zip"
          wget -q "$URL" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${VER}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version
      - name: runner.gd
        run: godot --headless --path godot -s res://tests/runner.gd
